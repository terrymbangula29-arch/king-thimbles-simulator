let cups
let pos = [0,160,320]
let shuffling=false
let winningCup

function startGame(){

cups=[
document.getElementById("cup1"),
document.getElementById("cup2"),
document.getElementById("cup3")
]

winningCup=Math.floor(Math.random()*3)+1

shuffleSequence(20)

}

function shuffleSequence(times){

shuffling=true

let shuffle=setInterval(()=>{

let a=Math.floor(Math.random()*3)
let b=Math.floor(Math.random()*3)

while(a===b){
b=Math.floor(Math.random()*3)
}

streetSwap(a,b)

times--

if(times<=0){

clearInterval(shuffle)

document.getElementById("result").innerText="Pick a cup"

shuffling=false

}

},220)

}

function streetSwap(a,b){

let cupA=cups[a]
let cupB=cups[b]

let posA=pos[a]
let posB=pos[b]

cupA.style.transform="translate("+posB+"px,-40px)"
cupB.style.transform="translate("+posA+"px,40px)"

setTimeout(()=>{

cupA.style.transform="translate("+posB+"px,0px)"
cupB.style.transform="translate("+posA+"px,0px)"

},200)

let temp=pos[a]
pos[a]=pos[b]
pos[b]=temp

}

function pickCup(choice){

if(shuffling){
alert("Wait for shuffle!")
return
}

if(choice===winningCup){

document.getElementById("result").innerText="🎉 You Win!"

}else{

document.getElementById("result").innerText="❌ Try Again"

}

}

</script>
