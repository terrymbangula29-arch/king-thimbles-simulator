
<!DOCTYPE html>
<html>

<head>

<title>Aviator Simulator</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:10px 20px;
font-size:16px;
margin:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

#multiplier{
font-size:60px;
color:#00ff9c;
margin-top:30px;
}

.panel{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Aviator Crash Simulator</h1>

BET

<br>

<input id="bet" type="number" value="1">

<br>

AUTO CASHOUT

<br>

<input id="cashout" type="number" value="2">

<br>

<button onclick="start()">START ROUND</button>

<div id="multiplier">1.00x</div>

<h2 id="result"></h2>

<div class="panel">

Total Rounds:
<span id="rounds">0</span>

<br>

Total Profit:
<span id="profit">0</span>

</div>

<script>

let multiplier=1
let interval
let crashPoint

let rounds=0
let profit=0

function generateCrash(){

let r=Math.random()

return Math.max(1,(1/(1-r))).toFixed(2)

}

function start(){

multiplier=1

crashPoint=parseFloat(generateCrash())

document.getElementById("result").innerText=""

let bet=parseFloat(document.getElementById("bet").value)

let cashout=parseFloat(document.getElementById("cashout").value)

interval=setInterval(()=>{

multiplier+=0.02

document.getElementById("multiplier").innerText=
multiplier.toFixed(2)+"x"

if(multiplier>=crashPoint){

clearInterval(interval)

document.getElementById("result").innerText=
"CRASHED at "+crashPoint+"x"

rounds++

profit-=bet

updateStats()

}

if(multiplier>=cashout){

clearInterval(interval)

let win=bet*cashout

profit+=win-bet

document.getElementById("result").innerText=
"Cashed Out at "+cashout+"x | Win "+win

rounds++

updateStats()

}

},50)

}

function updateStats(){

document.getElementById("rounds").innerText=rounds

document.getElementById("profit").innerText=profit.toFixed(2)

}

</script>

</body>

</html>
